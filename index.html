    const NAVY='#06153F', PINK='#EDD1C8', CREAM='#FAF7F5';

      'isa_lp97@hotmail.it':               {id:'isa',      pass:'cfp2026/'},

    const TASK_STATUSES=['todo','in-progress','done'];

    const L_STATUSES=['pianificato','in lavorazione','completato'];
    const L_STYLE={pianificato:{bg:'#dbeafe',color:'#1e40af'},'in lavorazione':{bg:'#ffedd5',color:'#c2410c'},completato:{bg:'#dcfce7',color:'#166534'}};
    const L_BAR={pianificato:'#93c5fd','in lavorazione':'#fdba74',completato:'#86efac'};

    const CAL_TYPE_STYLE={Post:{bg:PINK,color:NAVY},Carosello:{bg:'#dbeafe',color:'#1e40af'},Reel:{bg:'#f3e8ff',color:'#6b21a8'},Storia:{bg:'#dcfce7',color:'#166534'}};

    const CAL_STATO_STYLE={'da fare':{bg:'#f1f3f5',color:'#868e96'},'in lavorazione':{bg:'#fff3bf',color:'#e67700'},pubblicato:{bg:'#d3f9d8',color:'#2f9e44'}};

    const GIORNI_IT=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

    function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
    function fmtDate(d){ return d?new Date(d).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'}):''; }
    function fmtTime(d){ return d?new Date(d).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):''; }
    function isOverdue(d){ return d&&new Date(d)<new Date()&&new Date(d).toDateString()!==new Date().toDateString(); }
    function useIsMobile(){ const [m,setM]=useState(window.innerWidth<768); useEffect(()=>{ const h=()=>setM(window.innerWidth<768); window.addEventListener('resize',h); return ()=>window.removeEventListener('resize',h); },[]); return m; }

    function Av({uid:id,size=28}){
      const u=USERS[id]; if(!u) return null;
      return <div title={u.name} style={{width:size,height:size,borderRadius:'50%',background:u.color,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.35,fontWeight:700,flexShrink:0,fontFamily:'DM Sans,sans-serif'}}>{u.initials}</div>;
    }
    function Btn({children,onClick,v='primary',style:ex={},disabled}){
      const s={primary:{background:NAVY,color:'#fff',border:'none'},secondary:{background:'#fff',color:NAVY,border:`1.5px solid ${NAVY}`},danger:{background:'#fff',color:'#c92a2a',border:'1.5px solid #c92a2a'}};
      return <button onClick={onClick} disabled={disabled} style={{padding:'10px 18px',borderRadius:8,cursor:'pointer',fontSize:14,fontWeight:600,fontFamily:'DM Sans,sans-serif',...s[v],opacity:disabled?.5:1,...ex}}>{children}</button>;
    }
    const IS={width:'100%',padding:'11px 12px',border:`1.5px solid ${PINK}`,borderRadius:8,fontSize:15,fontFamily:'DM Sans,sans-serif',outline:'none',boxSizing:'border-box',background:CREAM,color:NAVY};
    const LS={display:'block',fontSize:12,fontWeight:600,color:NAVY,marginBottom:6,letterSpacing:'0.05em',textTransform:'uppercase'};

    function Modal({title,onClose,children,wide=false}){
      const isMobile=useIsMobile();
      return <div style={{position:'fixed',inset:0,background:'rgba(6,21,63,0.55)',display:'flex',alignItems:isMobile?'flex-end':'flex-start',justifyContent:'center',zIndex:1000,padding:isMobile?0:'80px 20px 0',overflowY:'auto'}}>
        <div style={{background:'#fff',borderRadius:isMobile?'20px 20px 0 0':'16px',padding:isMobile?'28px 20px 32px':'32px',width:isMobile?'100%':wide?640:480,maxWidth:'100%',border:`1px solid ${PINK}`,maxHeight:isMobile?'92vh':'none',overflowY:'auto',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
            <h3 style={{margin:0,fontFamily:'DM Serif Display,serif',fontSize:18,color:NAVY}}>{title}</h3>
            <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:26,color:'#bbb',padding:4,lineHeight:1}}>×</button>
          </div>
          {children}
        </div>
      </div>;
    }

    function FileFields({files,setFiles}){
      return <div>
        <label style={LS}>Link file (Drive, Notion…)</label>
        {files.map((f,i)=><div key={i} style={{display:'flex',gap:8,marginBottom:8}}>
          <input style={{...IS,flex:'0 0 90px',fontSize:13}} value={f.name} onChange={e=>setFiles(files.map((x,j)=>j===i?{...x,name:e.target.value}:x))} placeholder="Nome"/>
          <input style={{...IS,flex:1,fontSize:13}} value={f.url} onChange={e=>setFiles(files.map((x,j)=>j===i?{...x,url:e.target.value}:x))} placeholder="https://…"/>
          {files.length>1&&<button onClick={()=>setFiles(files.filter((_,j)=>j!==i))} style={{background:'none',border:'none',cursor:'pointer',color:'#c92a2a',fontSize:22,padding:'0 4px',lineHeight:1}}>×</button>}
        </div>)}
        <button onClick={()=>setFiles([...files,{name:'',url:''}])} style={{background:'none',border:`1px dashed ${PINK}`,padding:'6px 14px',borderRadius:6,cursor:'pointer',fontSize:13,color:'#999',fontFamily:'DM Sans,sans-serif'}}>+ Aggiungi file</button>
      </div>;
    }

    function AddItemModal({onClose,onSave,sectionName}){
      const [name,setName]=useState('');const [date,setDate]=useState('');const [desc,setDesc]=useState('');const [files,setFiles]=useState([{name:'',url:''}]);
      return <Modal title={`Nuovo in "${sectionName}"`} onClose={onClose} wide>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div><label style={LS}>Nome *</label><input style={IS} value={name} onChange={e=>setName(e.target.value)} placeholder="es. Lancio Slim Legs" autoFocus/></div>
          <div><label style={LS}>Data *</label><input style={IS} type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div><label style={LS}>Descrizione</label><textarea style={{...IS,minHeight:80,resize:'vertical'}} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Descrivi…"/></div>
          <FileFields files={files} setFiles={setFiles}/>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <Btn v="secondary" onClick={onClose}>Annulla</Btn>
            <Btn disabled={!name||!date} onClick={()=>onSave({name,date,description:desc,files:files.filter(f=>f.url)})}>Salva</Btn>
          </div>
        </div>
      </Modal>;
    }

    function EditItemModal({onClose,onSave,item}){
      const [name,setName]=useState(item.name||'');const [date,setDate]=useState(item.date||'');const [desc,setDesc]=useState(item.description||'');const [files,setFiles]=useState(item.files&&item.files.length?item.files:[{name:'',url:''}]);
      return <Modal title="Modifica elemento" onClose={onClose} wide>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div><label style={LS}>Nome *</label><input style={IS} value={name} onChange={e=>setName(e.target.value)} autoFocus/></div>
          <div><label style={LS}>Data *</label><input style={IS} type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div><label style={LS}>Descrizione</label><textarea style={{...IS,minHeight:80,resize:'vertical'}} value={desc} onChange={e=>setDesc(e.target.value)}/></div>
          <FileFields files={files} setFiles={setFiles}/>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <Btn v="secondary" onClick={onClose}>Annulla</Btn>
            <Btn disabled={!name||!date} onClick={()=>onSave({...item,name,date,description:desc,files:files.filter(f=>f.url)})}>Salva modifiche</Btn>
          </div>
        </div>
      </Modal>;
    }

    function AddTaskModal({onClose,onSave,defaultAssignee}){
      const isMobile=useIsMobile();
      const [title,setTitle]=useState('');const [desc,setDesc]=useState('');const [assignedTo,setAssignedTo]=useState(defaultAssignee||'francesca');const [dueDate,setDueDate]=useState('');const [files,setFiles]=useState([{name:'',url:''}]);
      return <Modal title="Nuova Task" onClose={onClose} wide>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div><label style={LS}>Titolo *</label><input style={IS} value={title} onChange={e=>setTitle(e.target.value)} placeholder="es. Prepara copy email" autoFocus/></div>
          <div><label style={LS}>Descrizione</label><textarea style={{...IS,minHeight:60,resize:'vertical'}} value={desc} onChange={e=>setDesc(e.target.value)}/></div>
          <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:12}}>
            <div><label style={LS}>Assegna a</label><select style={IS} value={assignedTo} onChange={e=>setAssignedTo(e.target.value)}>{Object.values(USERS).map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
            <div><label style={LS}>Scadenza</label><input style={IS} type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)}/></div>
          </div>
          <FileFields files={files} setFiles={setFiles}/>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <Btn v="secondary" onClick={onClose}>Annulla</Btn>
            <Btn disabled={!title} onClick={()=>onSave({title,description:desc,assignedTo,dueDate,files:files.filter(f=>f.url)})}>Aggiungi</Btn>
          </div>
        </div>
      </Modal>;
    }

    function CalendarItemModal({onClose,onSave,item,date}){
      const isMobile=useIsMobile();
      const [titolo,setTitolo]=useState(item?.titolo||'');
      const [tipologia,setTipologia]=useState(item?.tipologia||'Post');
      const [descrizione,setDescrizione]=useState(item?.descrizione||'');
      const [caption,setCaption]=useState(item?.caption||'');
      const [stato,setStato]=useState(item?.stato||'da fare');
      const [fileUrl,setFileUrl]=useState(item?.fileUrl||'');
      const [fileName,setFileName]=useState(item?.fileName||'');
      const ts=CAL_TYPE_STYLE[tipologia]||CAL_TYPE_STYLE.Post;
      return <Modal title={item?'Modifica contenuto':'Nuovo contenuto'} onClose={onClose} wide>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:12}}>
            <div><label style={LS}>Titolo *</label><input style={IS} value={titolo} onChange={e=>setTitolo(e.target.value)} placeholder="es. Slim Legs Challenge" autoFocus/></div>
            <div><label style={LS}>Tipologia</label>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',paddingTop:4}}>
                {CAL_TYPES.map(t=><button key={t} onClick={()=>setTipologia(t)} style={{padding:'5px 12px',borderRadius:20,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'DM Sans,sans-serif',background:tipologia===t?CAL_TYPE_STYLE[t].bg:'#f1f3f5',color:tipologia===t?CAL_TYPE_STYLE[t].color:'#888'}}>{t}</button>)}
              </div>
            </div>
          </div>
          <div><label style={LS}>Descrizione</label><textarea style={{...IS,minHeight:65,resize:'vertical'}} value={descrizione} onChange={e=>setDescrizione(e.target.value)} placeholder="Concept, cosa si vede, note per il team..."/></div>
          <div style={{borderTop:`1px solid ${PINK}`,paddingTop:14}}>
            <label style={LS}>Caption</label>
            <textarea style={{...IS,minHeight:80,resize:'vertical'}} value={caption} onChange={e=>setCaption(e.target.value)} placeholder="Testo pronto per Instagram..."/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:12}}>
            <div><label style={LS}>Stato</label>
              <select style={IS} value={stato} onChange={e=>setStato(e.target.value)}>
                {CAL_STATO.map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
              </select>
            </div>
            <div><label style={LS}>File (Canva / Drive)</label>
              <input style={IS} value={fileUrl} onChange={e=>setFileUrl(e.target.value)} placeholder="https://canva.com/..."/>
            </div>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}}>
            <Btn v="secondary" onClick={onClose}>Annulla</Btn>
            <Btn disabled={!titolo} onClick={()=>onSave({...(item||{}),titolo,tipologia,descrizione,caption,stato,fileUrl,date})}>Salva</Btn>
          </div>
        </div>
      </Modal>;
    }

    function CalendarPage({section,calItems,comments,currentUser,isMobile,onAdd,onEdit,onDelete,onToggleView,onAddComment,onDeleteComment}){
      const [viewDate,setViewDate]=useState(new Date());
      const [modalDate,setModalDate]=useState(null);
      const [editingItem,setEditingItem]=useState(null);
      const [calComment,setCalComment]=useState('');
      const year=viewDate.getFullYear(), month=viewDate.getMonth();
      const firstDay=(new Date(year,month,1).getDay()||7)-1;
      const daysInMonth=new Date(year,month+1,0).getDate();
      const daysInPrev=new Date(year,month,0).getDate();
      const prevMonth=()=>setViewDate(new Date(year,month-1,1));
      const nextMonth=()=>setViewDate(new Date(year,month+1,1));
      const toDateStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const today=toDateStr(new Date());

      const cells=[];
      for(let i=firstDay-1;i>=0;i--) cells.push({day:daysInPrev-i,cur:false,date:toDateStr(new Date(year,month-1,daysInPrev-i))});
      for(let d=1;d<=daysInMonth;d++) cells.push({day:d,cur:true,date:toDateStr(new Date(year,month,d))});
      while(cells.length<42) cells.push({day:cells.length-firstDay-daysInMonth+1,cur:false,date:toDateStr(new Date(year,month+1,cells.length-firstDay-daysInMonth+1))});

      const getItems=date=>calItems.filter(i=>i.date===date);

      return <div style={{padding:isMobile?'14px':'32px 40px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <h1 style={{fontFamily:'DM Serif Display,serif',fontSize:isMobile?22:30,color:NAVY,margin:0}}>{section.emoji} {section.name}</h1>
            <div style={{display:'flex',gap:4}}>
              <button onClick={onToggleView} style={{padding:'5px 12px',fontSize:12,borderRadius:6,border:`1px solid ${PINK}`,background:'#fff',color:'#888',cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>📋 Board</button>
              <button style={{padding:'5px 12px',fontSize:12,borderRadius:6,border:`1.5px solid ${NAVY}`,background:NAVY,color:'#fff',cursor:'default',fontFamily:'DM Sans,sans-serif',fontWeight:600}}>📅 Calendario</button>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <button onClick={prevMonth} style={{background:'none',border:`1px solid ${PINK}`,borderRadius:6,padding:'6px 12px',cursor:'pointer',fontSize:13,color:NAVY,fontFamily:'DM Sans,sans-serif'}}>←</button>
            <span style={{fontWeight:600,fontSize:15,color:NAVY,minWidth:140,textAlign:'center'}}>{MESI_IT[month]} {year}</span>
            <button onClick={nextMonth} style={{background:'none',border:`1px solid ${PINK}`,borderRadius:6,padding:'6px 12px',cursor:'pointer',fontSize:13,color:NAVY,fontFamily:'DM Sans,sans-serif'}}>→</button>
          </div>
        </div>

        <div style={{background:'#fff',borderRadius:14,border:`1px solid ${PINK}`,overflow:'hidden',marginBottom:20}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,minmax(0,1fr))',borderBottom:`1px solid ${PINK}`}}>
            {GIORNI_IT.map(g=><div key={g} style={{padding:'8px 4px',textAlign:'center',fontSize:11,color:'#aaa',fontWeight:600,letterSpacing:'0.04em',background:CREAM}}>{g}</div>)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,minmax(0,1fr))'}}>
            {cells.map((cell,i)=>{
              const its=getItems(cell.date);
              const isToday=cell.date===today&&cell.cur;
              return <div key={i} onClick={()=>{ if(cell.cur){ setModalDate(cell.date); setEditingItem(null); }}}
                style={{minHeight:isMobile?60:88,padding:'6px 4px',borderRight:i%7!==6?`0.5px solid #f1f3f5`:'none',borderBottom:i<35?`0.5px solid #f1f3f5`:'none',cursor:cell.cur?'pointer':'default',background:cell.cur?'#fff':'#fafaf9',position:'relative'}}>
                <div style={{display:'flex',justifyContent:'flex-end',marginBottom:2}}>
                  <span style={{fontSize:11,fontWeight:isToday?700:400,color:isToday?'#fff':cell.cur?'#555':'#ccc',background:isToday?NAVY:'transparent',borderRadius:'50%',width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center'}}>{cell.day}</span>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:2}}>
                  {its.slice(0,isMobile?1:3).map(it=>{
                    const ts=CAL_TYPE_STYLE[it.tipologia]||CAL_TYPE_STYLE.Post;
                    const ss=CAL_STATO_STYLE[it.stato]||CAL_STATO_STYLE['da fare'];
                    return <div key={it.id} onClick={e=>{e.stopPropagation();setEditingItem(it);setModalDate(it.date);}}
                      style={{padding:'2px 5px',borderRadius:3,fontSize:10,background:ts.bg,color:ts.color,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',cursor:'pointer',display:'flex',alignItems:'center',gap:3}}>
                      <span style={{width:5,height:5,borderRadius:'50%',background:ss.color,flexShrink:0}}></span>
                      {it.titolo}
                    </div>;
                  })}
                  {its.length>3&&!isMobile&&<div style={{fontSize:10,color:'#aaa',paddingLeft:2}}>+{its.length-3} altri</div>}
                  {its.length>1&&isMobile&&<div style={{fontSize:10,color:'#aaa',paddingLeft:2}}>+{its.length-1}</div>}
                </div>
              </div>;
            })}
          </div>
        </div>

        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          {CAL_TYPES.map(t=>{const s=CAL_TYPE_STYLE[t];return <div key={t} style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'#888'}}>
            <div style={{width:10,height:10,borderRadius:2,background:s.bg}}></div>{t}
          </div>;})}
          <div style={{marginLeft:'auto',display:'flex',gap:8}}>
            {CAL_STATO.map(s=>{const st=CAL_STATO_STYLE[s];return <div key={s} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'#999'}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:st.color}}></div>{s}
            </div>;})}
          </div>
        </div>

        {(modalDate||editingItem)&&<CalendarItemModal
          date={modalDate}
          item={editingItem||undefined}
          onClose={()=>{setModalDate(null);setEditingItem(null);}}
          onSave={d=>{
            if(editingItem) onEdit({...d,id:editingItem.id,createdBy:editingItem.createdBy,createdAt:editingItem.createdAt});
            else onAdd({...d,id:uid(),createdBy:currentUser.id,createdAt:new Date().toISOString()});
            setModalDate(null); setEditingItem(null);
          }}
        />}

        <h2 style={{fontFamily:'DM Serif Display,serif',fontSize:isMobile?17:22,color:NAVY,margin:'2rem 0 14px'}}>Commenti</h2>
        <div style={{background:'#fff',borderRadius:12,border:`1px solid ${PINK}`,overflow:'hidden',marginBottom:40}}>
          <div style={{padding:isMobile?'12px 12px':'16px 20px',borderBottom:`1px solid ${PINK}`}}>
            <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>

      return <div style={{minHeight:'100vh',background:CREAM,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>

            <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:6}}>
              <svg width="20" height="26" viewBox="0 0 20 26" fill="none"><path d="M10 1C4 1 1 6 1 13C1 20 4 25 10 25C7.5 22 6 18 6 13C6 8 7.5 4 10 1Z" fill={PINK}/></svg>
              <span style={{fontFamily:'DM Serif Display,serif',fontSize:24,color:NAVY}}>Lunatica Board</span>
            </div>

          <div style={{marginBottom:24}}><label style={LS}>Password</label><input style={IS} type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} placeholder="••••••••"/></div>

    function EditTaskModal({onClose,onSave,task}){
      const isMobile=useIsMobile();
      const [title,setTitle]=useState(task.title||'');
      const [desc,setDesc]=useState(task.description||'');
      const [assignedTo,setAssignedTo]=useState(task.assignedTo||'francesca');
      const [dueDate,setDueDate]=useState(task.dueDate||'');
      const [status,setStatus]=useState(task.status||'todo');
      const [files,setFiles]=useState(task.files&&task.files.length?task.files:[{name:'',url:''}]);
      return <Modal title="Modifica Task" onClose={onClose} wide>
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div><label style={LS}>Titolo *</label><input style={IS} value={title} onChange={e=>setTitle(e.target.value)} autoFocus/></div>
          <div><label style={LS}>Descrizione</label><textarea style={{...IS,minHeight:60,resize:'vertical'}} value={desc} onChange={e=>setDesc(e.target.value)}/></div>
          <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:12}}>
            <div><label style={LS}>Assegna a</label><select style={IS} value={assignedTo} onChange={e=>setAssignedTo(e.target.value)}>{Object.values(USERS).map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
            <div><label style={LS}>Scadenza</label><input style={IS} type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)}/></div>
          </div>
          <div><label style={LS}>Stato</label>
            <select style={IS} value={status} onChange={e=>setStatus(e.target.value)}>
              {TASK_STATUSES.map(s=><option key={s} value={s}>{STATUS_LABEL[s]}</option>)}
            </select>
          </div>
          <FileFields files={files} setFiles={setFiles}/>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <Btn v="secondary" onClick={onClose}>Annulla</Btn>
            <Btn disabled={!title} onClick={()=>onSave({...task,title,description:desc,assignedTo,dueDate,status,files:files.filter(f=>f.url)})}>Salva modifiche</Btn>
          </div>
        </div>
      </Modal>;
    }

    function TaskCard({task,currentUser,onStatusChange,onDelete,onEdit}){
      const canDel=task.createdBy===currentUser.id||task.assignedTo===currentUser.id;
      const s=STATUS_STYLE[task.status]||STATUS_STYLE.todo;
      const next=TASK_STATUSES[(TASK_STATUSES.indexOf(task.status)+1)%TASK_STATUSES.length];
      const overdue=task.status!=='done'&&isOverdue(task.dueDate);
      const [editMode,setEditMode]=useState(false);
      return <><div style={{background:'#fff',border:`1px solid ${overdue?'#ff8787':'#eee'}`,borderRadius:10,padding:'12px 12px',marginBottom:8}}>
        <div style={{display:'flex',justifyContent:'space-between',gap:6,marginBottom:5}}>
          <p style={{margin:0,fontSize:13,fontWeight:600,color:NAVY,lineHeight:1.4,flex:1}}>{task.title}</p>
          <div style={{display:'flex',gap:2,flexShrink:0,alignItems:'center'}}>
            <button onClick={()=>setEditMode(true)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,padding:'0 3px',lineHeight:1}}>✏️</button>
            {canDel&&<button onClick={()=>onDelete(task.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#ddd',fontSize:18,padding:'0 2px',lineHeight:1}} onMouseOver={e=>e.target.style.color='#c92a2a'} onMouseOut={e=>e.target.style.color='#ddd'}>×</button>}
          </div>
        </div>
        {task.description&&<p style={{margin:'0 0 5px',fontSize:12,color:'#999',lineHeight:1.4}}>{task.description}</p>}
        {task.dueDate&&<p style={{margin:'0 0 5px',fontSize:11,color:overdue?'#c92a2a':'#aaa',fontWeight:overdue?700:400}}>📅 {fmtDate(task.dueDate)}{overdue?' ⚠️':''}</p>}
        {task.files&&task.files.filter(f=>f.url).length>0&&<div style={{marginBottom:5,display:'flex',gap:4,flexWrap:'wrap'}}>
          {task.files.filter(f=>f.url).map((f,i)=><a key={i} href={f.url} target="_blank" rel="noreferrer" style={{fontSize:10,padding:'2px 7px',background:CREAM,border:`1px solid ${PINK}`,borderRadius:10,color:NAVY,textDecoration:'none'}}>📎 {f.name||'File'}</a>)}
        </div>}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:6}}>
          <span style={{fontSize:10,color:'#ddd'}}>{fmtDate(task.createdAt)}</span>
          <button onClick={()=>onStatusChange(task.id,next)} style={{fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:20,border:'none',cursor:'pointer',background:s.bg,color:s.color,fontFamily:'DM Sans,sans-serif'}}>{STATUS_LABEL[task.status]}</button>
        </div>
      </div>
      {editMode&&<EditTaskModal onClose={()=>setEditMode(false)} task={task} onSave={d=>{onEdit(d);setEditMode(false);}}/>}
      </>;
    }

    function ItemsPage({section,items,tasks,onAdd,onDelete,onEdit,onStatusChange,onSelect,isMobile,onToggleView}){

      const sorted=[...items].sort((a,b)=>new Date(a.date)-new Date(b.date));

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22,gap:12}}>

            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
              <h1 style={{fontFamily:'DM Serif Display,serif',fontSize:isMobile?24:34,color:NAVY,margin:0}}>{section.emoji} {section.name}</h1>
              <div style={{display:'flex',gap:4}}>
                <button style={{padding:'5px 12px',fontSize:12,borderRadius:6,border:`1.5px solid ${NAVY}`,background:NAVY,color:'#fff',cursor:'default',fontFamily:'DM Sans,sans-serif',fontWeight:600}}>📋 Board</button>
                <button onClick={onToggleView} style={{padding:'5px 12px',fontSize:12,borderRadius:6,border:`1px solid ${PINK}`,background:'#fff',color:'#888',cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>📅 Calendario</button>
              </div>
            </div>
            <p style={{color:'#bbb',margin:0,fontSize:12}}>{items.length} elementi</p>

          <Btn onClick={()=>setShowModal(true)} style={{marginTop:2,padding:'8px 14px',fontSize:13,whiteSpace:'nowrap'}}>+ Nuovo</Btn>
        </div>
        {sorted.length===0

            {sorted.map(item=>{
              const lt=tasks[item.id]||[];const done=lt.filter(t=>t.status==='done').length;
              const prog=lt.length>0?Math.round(done/lt.length*100):0;
              const ls=L_STYLE[item.status]||L_STYLE.pianificato;
              const barColor=L_BAR[item.status]||L_BAR.pianificato;
              return <div key={item.id} onClick={()=>onSelect(item)} style={{background:'#fff',borderRadius:14,border:`1px solid ${PINK}`,overflow:'hidden',cursor:'pointer'}}>
                <div style={{height:4,background:barColor}}/>
                <div style={{padding:'14px 14px 12px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:8}}>
                    <h3 style={{fontFamily:'DM Serif Display,serif',fontSize:17,color:NAVY,margin:0,flex:1,lineHeight:1.3}}>{item.name}</h3>
                    <span style={{fontSize:10,fontWeight:700,padding:'3px 9px',borderRadius:20,whiteSpace:'nowrap',flexShrink:0,...ls}}>{item.status}</span>
                  </div>
                  <p style={{fontSize:12,color:'#aaa',margin:'0 0 8px'}}>📅 {fmtDate(item.date)}</p>
                  {item.description&&<p style={{fontSize:12,color:'#666',margin:'0 0 10px',lineHeight:1.5,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{item.description}</p>}
                  {lt.length>0&&<div style={{marginBottom:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#ccc',marginBottom:3}}><span>Task</span><span>{done}/{lt.length}</span></div>
                    <div style={{height:3,background:'#f1f3f5',borderRadius:2}}><div style={{height:'100%',width:`${prog}%`,background:NAVY,borderRadius:2}}/></div>
                  </div>}
                  {item.files&&item.files.filter(f=>f.url).length>0&&<p style={{fontSize:11,color:'#bbb',margin:'0 0 8px'}}>📎 {item.files.filter(f=>f.url).length} file</p>}
                  <div style={{display:'flex',gap:6,justifyContent:'flex-end',alignItems:'center'}} onClick={e=>e.stopPropagation()}>
                    <select value={item.status} onChange={e=>onStatusChange(item.id,e.target.value)} style={{fontSize:11,padding:'4px 6px',border:`1px solid ${PINK}`,borderRadius:6,background:CREAM,color:NAVY,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>
                      {L_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                    </select>
                    <button onClick={()=>setEditItem(item)} style={{background:'none',border:'none',cursor:'pointer',fontSize:14,padding:'2px 4px'}} title="Modifica">✏️</button>
                    <button onClick={()=>setConfirmDel(item)} style={{background:'none',border:'none',cursor:'pointer',color:'#ddd',fontSize:16,padding:'2px 4px'}} onMouseOver={e=>e.target.style.color='#c92a2a'} onMouseOut={e=>e.target.style.color='#ddd'}>🗑</button>
                  </div>
                </div>
              </div>;
            })}

        {showModal&&<AddItemModal onClose={()=>setShowModal(false)} sectionName={section.name} onSave={d=>{onAdd(d);setShowModal(false);}}/>}
        {editItem&&<EditItemModal onClose={()=>setEditItem(null)} item={editItem} onSave={d=>{onEdit(d);setEditItem(null);}}/>}
        {confirmDel&&<Modal title="Elimina elemento" onClose={()=>setConfirmDel(null)}>

          <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
            <Btn v="secondary" onClick={()=>setConfirmDel(null)}>Annulla</Btn>
            <Btn v="danger" onClick={()=>{onDelete(confirmDel.id);setConfirmDel(null);}}>Elimina</Btn>
          </div>
        </Modal>}
      </div>;
    }

    function ItemDetailPage({item,tasks,comments,currentUser,sectionName,onBack,onAddTask,onUpdateTaskStatus,onDeleteTask,onEditTask,onAddComment,onDeleteComment,onEdit,isMobile}){
      const [showAddTask,setShowAddTask]=useState(null);
      const [commentText,setCommentText]=useState('');
      const [editMode,setEditMode]=useState(false);
      const handleComment=()=>{ if(!commentText.trim()) return; onAddComment(commentText); setCommentText(''); };
      const renderComment=text=>text.split(/(@\w+)/g).map((p,i)=>{
        const u=Object.values(USERS).find(u=>p==='@'+u.name);
        return u?<strong key={i} style={{color:NAVY,background:PINK,padding:'1px 5px',borderRadius:3}}>{p}</strong>:p;
      });

            <div style={{flex:1,minWidth:0}}>
              <h1 style={{fontFamily:'DM Serif Display,serif',fontSize:isMobile?20:28,color:NAVY,margin:'0 0 6px',lineHeight:1.2}}>{item.name}</h1>
              <p style={{color:'#aaa',margin:'0 0 6px',fontSize:12}}>📅 {fmtDate(item.date)}</p>

            </div>
          </div>

                  <p style={{margin:0,fontWeight:700,fontSize:11,color:NAVY,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{u.name}</p>

                        {c.authorId===currentUser.id&&<button onClick={()=>onDeleteComment(c.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#ddd',fontSize:15,padding:0}}>×</button>}

          }
        </div>
        {showAddTask&&<AddTaskModal onClose={()=>setShowAddTask(null)} defaultAssignee={showAddTask} onSave={d=>{onAddTask(d);setShowAddTask(null);}}/>}
        {editMode&&<EditItemModal onClose={()=>setEditMode(false)} item={item} onSave={d=>{onEdit(d);setEditMode(false);}}/>}
      </div>;
    }

    function LunaticaBoard(){
      const isMobile=useIsMobile();
      const [user,setUser]=useState(null);
      const [view,setView]=useState('items');
      const [activeSectionId,setActiveSectionId]=useState('lanci');
      const [activeItem,setActiveItem]=useState(null);
      const [sections,setSections]=useState([DEFAULT_SECTION]);
      const [items,setItems]=useState({});
      const [tasks,setTasks]=useState({});
      const [comments,setComments]=useState({});
      const [notifs,setNotifs]=useState({});
      const [calendarItems,setCalendarItems]=useState({});
      const [showNotifs,setShowNotifs]=useState(false);
      const [showAddSection,setShowAddSection]=useState(false);
      const [newSectionName,setNewSectionName]=useState('');
      const [renamingSection,setRenamingSection]=useState(null);
      const [renameValue,setRenameValue]=useState('');
      const [sidebarOpen,setSidebarOpen]=useState(false);
      const [loading,setLoading]=useState(true);

      useEffect(()=>{ if(user) loadAll(); },[user]);
      useEffect(()=>{ if(!isMobile) setSidebarOpen(false); },[isMobile]);

      async function loadAll(){
        setLoading(true);
        const [s,it,t,c,n,ci]=await Promise.all([dbGet('luna:sections'),dbGet('luna:items'),dbGet('luna:tasks'),dbGet('luna:comments'),dbGet('luna:notifs'),dbGet('luna:calItems')]);
        if(s&&s.length) setSections(s); if(it) setItems(it); if(t) setTasks(t); if(c) setComments(c); if(n) setNotifs(n); if(ci) setCalendarItems(ci);
        setLoading(false);
      }

      const saveSections=async d=>{setSections(d);await dbSet('luna:sections',d);};
      const saveItems   =async d=>{setItems(d);   await dbSet('luna:items',d);};
      const saveTasks   =async d=>{setTasks(d);   await dbSet('luna:tasks',d);};
      const saveCalendarItems=async d=>{setCalendarItems(d);await dbSet('luna:calItems',d);};
      const saveComments=async d=>{setComments(d);await dbSet('luna:comments',d);};
      const saveNotifs  =async d=>{setNotifs(d);  await dbSet('luna:notifs',d);};

      const addSection=async()=>{
        if(!newSectionName.trim()) return;
        const EMOJIS=['📋','📧','🌙','💬','📱','🎯','✨','📊'];
        const ns={id:uid(),name:newSectionName.trim(),emoji:EMOJIS[sections.length%EMOJIS.length],createdAt:new Date().toISOString()};
        await saveSections([...sections,ns]); setNewSectionName(''); setShowAddSection(false); setActiveSectionId(ns.id);
        if(isMobile) setSidebarOpen(false);
      };
      const deleteSection=async id=>{
        if(sections.find(s=>s.id===id)?.isDefault) return;
        const ni={...items}; delete ni[id]; await saveItems(ni);
        await saveSections(sections.filter(s=>s.id!==id));
        if(activeSectionId===id){ setActiveSectionId('lanci'); setView('items'); setActiveItem(null); }
      };
      const renameSection=async(id,newName)=>{
        if(!newName.trim()) return;
        await saveSections(sections.map(s=>s.id===id?{...s,name:newName.trim()}:s));
        setRenamingSection(null); setRenameValue('');
      };
      const toggleSectionView=async id=>saveSections(sections.map(s=>s.id===id?{...s,viewType:s.viewType==='calendar'?'board':'calendar'}:s));
      const addCalItem=async(secId,item)=>saveCalendarItems({...calendarItems,[secId]:[...(calendarItems[secId]||[]),item]});
      const editCalItem=async(secId,updated)=>saveCalendarItems({...calendarItems,[secId]:(calendarItems[secId]||[]).map(i=>i.id===updated.id?updated:i)});
      const deleteCalItem=async(secId,id)=>saveCalendarItems({...calendarItems,[secId]:(calendarItems[secId]||[]).filter(i=>i.id!==id)});
      const addItem=async(secId,d)=>saveItems({...items,[secId]:[...(items[secId]||[]),{id:uid(),sectionId:secId,...d,createdBy:user.id,createdAt:new Date().toISOString(),status:'pianificato'}]});
      const deleteItem=async(secId,id)=>{
        await saveItems({...items,[secId]:(items[secId]||[]).filter(i=>i.id!==id)});
        const nt={...tasks}; delete nt[id]; await saveTasks(nt);
        const nc={...comments}; delete nc[id]; await saveComments(nc);
      };
      const updateItemStatus=async(secId,id,s)=>saveItems({...items,[secId]:(items[secId]||[]).map(i=>i.id===id?{...i,status:s}:i)});
      const editItem=async(secId,updated)=>saveItems({...items,[secId]:(items[secId]||[]).map(i=>i.id===updated.id?updated:i)});
      const addTask=async(itemId,d)=>saveTasks({...tasks,[itemId]:[...(tasks[itemId]||[]),{id:uid(),itemId,...d,createdBy:user.id,createdAt:new Date().toISOString(),status:'todo'}]});
      const updateTaskStatus=async(itemId,taskId,s)=>saveTasks({...tasks,[itemId]:(tasks[itemId]||[]).map(t=>t.id===taskId?{...t,status:s}:t)});
      const deleteTask=async(itemId,taskId)=>saveTasks({...tasks,[itemId]:(tasks[itemId]||[]).filter(t=>t.id!==taskId)});
      const editTask=async(itemId,updated)=>saveTasks({...tasks,[itemId]:(tasks[itemId]||[]).map(t=>t.id===updated.id?updated:t)});
      const addComment=async(itemId,text)=>{
        const mentions=Object.values(USERS).filter(u=>text.includes('@'+u.name)).map(u=>u.id);
        const nc={id:uid(),itemId,text,authorId:user.id,createdAt:new Date().toISOString(),mentions};
        await saveComments({...comments,[itemId]:[...(comments[itemId]||[]),nc]});
        if(mentions.length){
          const nn={...notifs};
          const preview=text.length>70?text.slice(0,70)+'…':text;
          mentions.filter(m=>m!==user.id).forEach(mid=>{
            nn[mid]=[...(nn[mid]||[]),{id:uid(),type:'mention',commentId:nc.id,itemId,fromUserId:user.id,preview,read:false,createdAt:new Date().toISOString()}];
            // Invia email
            const targetItem=Object.values(items).flat().find(i=>i.id===itemId);
            sendEmailNotif(USERS[mid], user, targetItem?.name||'Lunatica Board', preview);
          });
          await saveNotifs(nn);
        }
      };
      const deleteComment=async(itemId,commentId)=>saveComments({...comments,[itemId]:(comments[itemId]||[]).filter(c=>c.id!==commentId)});
      const markRead=async()=>{ const updated=(notifs[user.id]||[]).map(n=>({...n,read:true})); await saveNotifs({...notifs,[user.id]:updated}); };

      const navigateTo=(secId,item=null)=>{
        setActiveSectionId(secId);
        if(item){ setActiveItem(item); setView('detail'); } else { setView('items'); setActiveItem(null); }
        if(isMobile) setSidebarOpen(false);
      };

      if(!user) return <LoginScreen onLogin={setUser}/>;
      if(loading) return <div style={{minHeight:'100vh',background:CREAM,display:'flex',alignItems:'center',justifyContent:'center',color:NAVY,fontSize:16}}>Caricamento…</div>;

      const activeSection=sections.find(s=>s.id===activeSectionId)||sections[0];
      const sectionItems=items[activeSectionId]||[];
      const userNotifs=[...(notifs[user.id]||[])].reverse();
      const unread=userNotifs.filter(n=>!n.read).length;

      return <div style={{display:'flex',minHeight:'100vh',background:CREAM}}>

        {/* Mobile backdrop */}
        {isMobile&&sidebarOpen&&<div onClick={()=>setSidebarOpen(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:399}}/>}

        {/* SIDEBAR */}
        <aside style={{width:224,background:NAVY,color:'#fff',display:'flex',flexDirection:'column',flexShrink:0,position:isMobile?'fixed':'sticky',top:0,height:'100vh',overflowY:'auto',zIndex:isMobile?400:1,transform:isMobile?(sidebarOpen?'translateX(0)':'translateX(-224px)'):'none',transition:'transform 0.28s ease'}}>
          <div style={{padding:'20px 18px 16px',borderBottom:'1px solid rgba(237,209,200,0.15)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <svg width="13" height="17" viewBox="0 0 14 18" fill="none"><path d="M7 1C3 1 1 4.5 1 9C1 13.5 3 17 7 17C5 14.5 4 12 4 9C4 6 5 3.5 7 1Z" fill={PINK}/></svg>
                <span style={{fontFamily:'DM Serif Display,serif',fontSize:15}}>Lunatica Board</span>
              </div>
              {isMobile&&<button onClick={()=>setSidebarOpen(false)} style={{background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,0.5)',fontSize:22,padding:0,lineHeight:1}}>×</button>}
            </div>
            <p style={{fontSize:9,color:'rgba(237,209,200,0.35)',margin:'3px 0 0',letterSpacing:'0.08em',textTransform:'uppercase'}}>CFP Team</p>
          </div>

          <div style={{flex:1,padding:'8px 0',overflowY:'auto'}}>
            <p style={{fontSize:9,color:'rgba(255,255,255,0.25)',padding:'6px 18px 4px',letterSpacing:'0.1em',textTransform:'uppercase',margin:0}}>Sezioni</p>
            {sections.map(sec=>(
              <div key={sec.id} style={{display:'flex',alignItems:'center'}}>
                {renamingSection===sec.id
                  ?<div style={{flex:1,padding:'4px 10px'}}>
                      <input value={renameValue} onChange={e=>setRenameValue(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')renameSection(sec.id,renameValue);if(e.key==='Escape'){setRenamingSection(null);setRenameValue('');}}} autoFocus
                        style={{width:'100%',padding:'5px 8px',background:'rgba(255,255,255,0.12)',border:`1px solid ${PINK}`,borderRadius:5,color:'#fff',fontSize:12,fontFamily:'DM Sans,sans-serif',outline:'none',boxSizing:'border-box'}}/>
                      <div style={{display:'flex',gap:5,marginTop:4}}>
                        <button onClick={()=>renameSection(sec.id,renameValue)} style={{flex:1,padding:'4px',background:PINK,color:NAVY,border:'none',borderRadius:4,cursor:'pointer',fontSize:10,fontWeight:700,fontFamily:'DM Sans,sans-serif'}}>✓</button>
                        <button onClick={()=>{setRenamingSection(null);setRenameValue('');}} style={{flex:1,padding:'4px',background:'rgba(255,255,255,0.08)',color:'rgba(255,255,255,0.6)',border:'none',borderRadius:4,cursor:'pointer',fontSize:10,fontFamily:'DM Sans,sans-serif'}}>✕</button>
                      </div>
                    </div>
                  :<>
                    <button onClick={()=>navigateTo(sec.id)} style={{flex:1,display:'flex',alignItems:'center',gap:8,padding:'12px 18px',background:activeSectionId===sec.id?'rgba(237,209,200,0.12)':'transparent',border:'none',color:'#fff',cursor:'pointer',fontSize:13,fontFamily:'DM Sans,sans-serif',borderLeft:activeSectionId===sec.id?`3px solid ${PINK}`:'3px solid transparent',textAlign:'left',minHeight:44}}>
                      {sec.emoji} {sec.name}
                    </button>
                    <button onClick={()=>{setRenamingSection(sec.id);setRenameValue(sec.name);}} style={{background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,0.18)',fontSize:11,padding:'0 4px',minWidth:24,minHeight:44,display:'flex',alignItems:'center',justifyContent:'center'}}>✏️</button>
                    {!sec.isDefault&&<button onClick={()=>deleteSection(sec.id)} style={{background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,0.15)',fontSize:14,paddingRight:12,minWidth:28,minHeight:44,display:'flex',alignItems:'center',justifyContent:'center'}} onMouseOver={e=>e.target.style.color='#ff8787'} onMouseOut={e=>e.target.style.color='rgba(255,255,255,0.15)'}>×</button>}
                  </>
                }
              </div>
            ))}
            {showAddSection
              ?<div style={{padding:'8px 12px'}}>
                  <input value={newSectionName} onChange={e=>setNewSectionName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addSection();if(e.key==='Escape')setShowAddSection(false);}} placeholder="Nome sezione…" autoFocus
                    style={{width:'100%',padding:'8px 10px',background:'rgba(255,255,255,0.08)',border:'1px solid rgba(237,209,200,0.25)',borderRadius:6,color:'#fff',fontSize:13,fontFamily:'DM Sans,sans-serif',outline:'none',boxSizing:'border-box'}}/>
                  <div style={{display:'flex',gap:6,marginTop:6}}>
                    <button onClick={addSection} style={{flex:1,padding:'7px',background:PINK,color:NAVY,border:'none',borderRadius:5,cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'DM Sans,sans-serif'}}>Crea</button>
                    <button onClick={()=>{setShowAddSection(false);setNewSectionName('');}} style={{flex:1,padding:'7px',background:'rgba(255,255,255,0.08)',color:'rgba(255,255,255,0.6)',border:'none',borderRadius:5,cursor:'pointer',fontSize:12,fontFamily:'DM Sans,sans-serif'}}>✕</button>
                  </div>
                </div>
              :<button onClick={()=>setShowAddSection(true)} style={{display:'flex',alignItems:'center',gap:6,width:'100%',padding:'10px 18px',background:'none',border:'none',color:'rgba(255,255,255,0.3)',cursor:'pointer',fontSize:12,fontFamily:'DM Sans,sans-serif',textAlign:'left',minHeight:44}}>+ Nuova sezione</button>
            }
          </div>

          <div style={{borderTop:'1px solid rgba(237,209,200,0.15)',padding:'12px 18px'}}>
            <div style={{marginBottom:10}}>
              <button onClick={()=>{setShowNotifs(!showNotifs);if(!showNotifs)markRead();}}
                style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'10px 12px',background:'rgba(237,209,200,0.08)',border:'1px solid rgba(237,209,200,0.18)',borderRadius:8,color:'#fff',cursor:'pointer',fontFamily:'DM Sans,sans-serif',fontSize:13,minHeight:44}}>
                🔔 <span style={{flex:1,textAlign:'left'}}>Notifiche</span>
                {unread>0&&<span style={{background:'#ff4757',color:'#fff',borderRadius:10,minWidth:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,padding:'0 5px'}}>{unread}</span>}
              </button>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
              <Av uid={user.id} size={28}/>
              <div style={{flex:1,minWidth:0}}>
                <p style={{margin:0,fontSize:13,fontWeight:700}}>{user.name}</p>
                <p style={{margin:0,fontSize:10,color:'rgba(255,255,255,0.35)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.email}</p>
              </div>
            </div>
            <button onClick={()=>{setUser(null);setView('items');setActiveSectionId('lanci');setActiveItem(null);setSidebarOpen(false);}} style={{width:'100%',padding:'9px',background:'rgba(237,209,200,0.07)',border:'1px solid rgba(237,209,200,0.15)',borderRadius:6,color:'rgba(255,255,255,0.5)',cursor:'pointer',fontSize:12,fontFamily:'DM Sans,sans-serif',minHeight:40}}>Esci</button>
          </div>
        </aside>

        {/* Hamburger (mobile only) */}
        {isMobile&&<button onClick={()=>setSidebarOpen(true)} style={{position:'fixed',top:10,left:10,zIndex:300,background:NAVY,border:'none',borderRadius:10,width:44,height:44,cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:5,boxShadow:'0 2px 12px rgba(6,21,63,0.3)'}}>
          <div style={{width:18,height:2,background:'#fff',borderRadius:1}}/>
          <div style={{width:18,height:2,background:'#fff',borderRadius:1}}/>
          <div style={{width:18,height:2,background:'#fff',borderRadius:1}}/>
          {unread>0&&<div style={{position:'absolute',top:5,right:5,width:14,height:14,background:'#ff4757',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#fff',fontWeight:700}}>{unread}</div>}
        </button>}

        {/* Notification panel */}
        {showNotifs&&<>
          <div onClick={()=>setShowNotifs(false)} style={{position:'fixed',inset:0,zIndex:998}}/>
          <div style={{position:'fixed',bottom:isMobile?0:20,left:isMobile?0:234,right:isMobile?0:'auto',width:isMobile?'100%':320,background:'#fff',borderRadius:isMobile?'20px 20px 0 0':'14px',border:`1px solid ${PINK}`,zIndex:999,maxHeight:isMobile?'78vh':420,overflowY:'auto',boxShadow:'0 -4px 32px rgba(6,21,63,0.15)'}}>
            <div style={{padding:'14px 18px',borderBottom:`1px solid ${PINK}`,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,background:'#fff',borderRadius:isMobile?'20px 20px 0 0':'14px 14px 0 0'}}>
              <span style={{fontFamily:'DM Serif Display,serif',fontSize:17,color:NAVY}}>Notifiche</span>
              <button onClick={()=>setShowNotifs(false)} style={{background:'none',border:'none',cursor:'pointer',color:'#aaa',fontSize:22,lineHeight:1,padding:'0 4px',minWidth:36,minHeight:36,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
            </div>
            {userNotifs.length===0
              ?<p style={{padding:'32px 16px',color:'#ccc',fontSize:13,margin:0,textAlign:'center'}}>Nessuna notifica ancora 🌙</p>
              :userNotifs.map(n=>{
                  const allItems=Object.values(items).flat();
                  const targetItem=allItems.find(i=>i.id===n.itemId);
                  return <div key={n.id} onClick={()=>{if(targetItem){navigateTo(targetItem.sectionId,targetItem);setShowNotifs(false);}}}
                    style={{padding:'14px 18px',borderBottom:'1px solid #f8f9fa',cursor:targetItem?'pointer':'default',background:n.read?'transparent':'rgba(237,209,200,0.18)',display:'flex',gap:12,alignItems:'flex-start',minHeight:60}}>
                    <Av uid={n.fromUserId} size={30}/>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{margin:'0 0 3px',fontSize:13,color:NAVY,lineHeight:1.3}}><strong>{USERS[n.fromUserId]?.name}</strong> ti ha taggato</p>
                      <p style={{margin:'0 0 4px',fontSize:12,color:'#888',lineHeight:1.4,fontStyle:'italic',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>"{n.preview}"</p>
                      <p style={{margin:0,fontSize:11,color:'#ccc'}}>{fmtTime(n.createdAt)}{targetItem?' · '+targetItem.name:''}</p>
                    </div>
                    {!n.read&&<div style={{width:9,height:9,borderRadius:'50%',background:'#ff4757',flexShrink:0,marginTop:4}}/>}
                  </div>;
                })
            }
          </div>
        </>}

        {/* MAIN */}
        <main style={{flex:1,overflowX:'hidden',paddingTop:isMobile?54:0}}>
          {view==='items'
            ? activeSection?.viewType==='calendar'
              ? <CalendarPage section={activeSection} calItems={calendarItems[activeSectionId]||[]} currentUser={user} isMobile={isMobile}
                  comments={comments[activeSectionId]||[]}
                  onAdd={item=>addCalItem(activeSectionId,item)}
                  onEdit={item=>editCalItem(activeSectionId,item)}
                  onDelete={id=>deleteCalItem(activeSectionId,id)}
                  onToggleView={()=>toggleSectionView(activeSectionId)}
                  onAddComment={text=>addComment(activeSectionId,text)}
                  onDeleteComment={commentId=>deleteComment(activeSectionId,commentId)}
                />
              : <ItemsPage section={activeSection} items={sectionItems} tasks={tasks} isMobile={isMobile}
                  onAdd={d=>addItem(activeSectionId,d)}
                  onDelete={id=>deleteItem(activeSectionId,id)}
                  onEdit={d=>editItem(activeSectionId,d)}
                  onStatusChange={(id,s)=>updateItemStatus(activeSectionId,id,s)}
                  onSelect={item=>{setActiveItem(item);setView('detail');}}
                  onToggleView={()=>toggleSectionView(activeSectionId)}
                />
            :<ItemDetailPage
                item={(items[activeSectionId]||[]).find(i=>i.id===activeItem?.id)||activeItem}
                tasks={tasks[activeItem?.id]||[]}
                comments={comments[activeItem?.id]||[]}
                currentUser={user}
                sectionName={activeSection?.name||''}
                isMobile={isMobile}
                onBack={()=>{setView('items');setActiveItem(null);}}
                onAddTask={d=>addTask(activeItem.id,d)}
                onUpdateTaskStatus={(taskId,s)=>updateTaskStatus(activeItem.id,taskId,s)}
                onDeleteTask={taskId=>deleteTask(activeItem.id,taskId)}
                onEditTask={updated=>editTask(activeItem.id,updated)}
                onAddComment={text=>addComment(activeItem.id,text)}
                onDeleteComment={commentId=>deleteComment(activeItem.id,commentId)}
                onEdit={d=>{editItem(activeSectionId,d);setActiveItem(d);}}
              />
          }
        </main>
      </div>;
    }

    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LunaticaBoard/>);
  </script>
</body>
</html>
